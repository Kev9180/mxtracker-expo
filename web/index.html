<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MXTracker - Confirmation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: #0f0f0f;
      padding: 32px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 3px solid #e3001b;
    }

    .logo-mx {
      font-size: 28px;
      font-weight: 900;
      color: #e3001b;
      letter-spacing: 2px;
    }

    .logo-tracker {
      font-size: 14px;
      font-weight: 900;
      color: white;
      letter-spacing: 4px;
    }

    .content {
      padding: 48px 32px;
      text-align: center;
    }

    .status-icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: inline-block;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0f0f0f;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .message {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .vehicle-info {
      font-size: 14px;
      color: #888;
      font-style: italic;
      margin-bottom: 24px;
      padding: 16px;
      background: #f9f9f9;
      border-left: 3px solid #e3001b;
      text-align: left;
      border-radius: 4px;
    }

    .task-name {
      font-weight: 700;
      color: #0f0f0f;
      display: block;
      margin-bottom: 8px;
    }

    .cta-link {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 28px;
      background: #e3001b;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    .cta-link:hover {
      background: #c60016;
    }

    .footer {
      background: #f9f9f9;
      padding: 20px 32px;
      border-top: 1px solid #e8e8e8;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }

    .error-state {
      background: #fff5f5;
      padding: 48px 32px;
      text-align: center;
    }

    .error-state h1 {
      color: #c60016;
    }

    .error-state .message {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-mx">MX</div>
      <div class="logo-tracker">TRACKER</div>
    </div>

    <div id="content">
      <!-- Populated by JavaScript based on query params -->
    </div>

    <div class="footer">
      <p>MXTracker &middot; <a href="https://mxtracker.app" style="color: #aaa; text-decoration: none;">mxtracker.app</a></p>
    </div>
  </div>

  <script>
    // Parse query parameters
    const params = new URLSearchParams(window.location.search);
    const result = params.get('result');

    const contentEl = document.getElementById('content');

    const confirmations = {
      snooze_week: {
        icon: '⏰',
        title: 'Reminder Snoozed',
        message: 'We\'ll remind you again in <strong>1 week</strong> about this service.',
        cta: 'Back to App'
      },
      snooze_month: {
        icon: '📅',
        title: 'Reminder Snoozed',
        message: 'We\'ll remind you again in <strong>1 month</strong> about this service.',
        cta: 'Back to App'
      },
      stop: {
        icon: '✓',
        title: 'Reminders Stopped',
        message: 'You won\'t receive any more reminders for this service. You can re-enable reminders in the app.',
        cta: 'Back to App'
      }
    };

    const config = confirmations[result];

    if (config) {
      contentEl.innerHTML = `
        <div class="content">
          <div class="status-icon">${config.icon}</div>
          <h1>${config.title}</h1>
          <p class="message">${config.message}</p>
          <a href="https://mxtracker.app" class="cta-link">${config.cta}</a>
        </div>
      `;
    } else {
      contentEl.innerHTML = `
        <div class="error-state">
          <h1>Invalid Link</h1>
          <p class="message">This confirmation link is missing required parameters or has expired.</p>
          <a href="https://mxtracker.app" class="cta-link">Back to App</a>
        </div>
      `;
    }
  </script>
</body>
</html>
