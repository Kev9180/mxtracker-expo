<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — MXTracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: #fff;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .brand {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #e3001b;
      margin-bottom: 4px;
    }
    .accent { height: 2px; background: #e3001b; margin-bottom: 32px; }
    h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #444;
      margin-bottom: 16px;
    }
    a {
      color: #e3001b;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">MXTRACKER</div>
    <div class="accent"></div>
    <h1>Support</h1>
    <p>Have a question, found a bug, or want to suggest a feature? We'd love to hear from you.</p>
    <p>Email us at <a href="mailto:developer@mxtracker.app">developer@mxtracker.app</a> and we'll get back to you as soon as possible.</p>
    <p>You can also send feedback directly from the app: go to <strong>Settings → Send Feedback</strong>.</p>
  </div>
</body>
</html>
